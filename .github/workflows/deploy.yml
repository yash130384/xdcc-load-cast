name: Deploy and Start Server

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository (Local Git Fetch & Reset)
        run: |
          git fetch origin
          git reset --hard ${{ github.sha }}
      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build:frontend

      - name: Start/Restart server with PM2
        env:
          RUNNER_TRACKING_ID: ""
        run: |
          echo "Starting/Restarting server via PM2..."
          if command -v pm2 >/dev/null 2>&1; then
            pm2 restart xdcc-load-cast || pm2 start server.js --name xdcc-load-cast
            pm2 save
          else
            echo "Global pm2 not found, falling back to npx pm2..."
            npx pm2 restart xdcc-load-cast || npx pm2 start server.js --name xdcc-load-cast
            npx pm2 save
          fi

