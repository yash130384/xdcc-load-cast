name: Deploy and Start Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build:frontend

      - name: Stop existing server
        run: |
          echo "Stopping server running on port 3000..."
          # Kill process listening on port 3000 if it exists
          PID=$(lsof -t -i:3000)
          if [ ! -z "$PID" ]; then
            echo "Killing process $PID"
            kill -9 $PID
          else
            echo "No process running on port 3000"
          fi

      - name: Start server in background
        env:
          RUNNER_TRACKING_ID: "" # Prevents GitHub Actions from killing the background server process when the job completes
        run: |
          echo "Starting server..."
          nohup npm start > server.log 2>&1 &
          sleep 2 # Give it a moment to spin up
          cat server.log
